<title>Jummi — binnenkort online</title>
<meta name="description" content="Jummi werkt aan een gloednieuwe website. Binnenkort bestel je hier je favoriete Jummi's — vers en razendsnel bezorgd. Love at first bite.">

<style>
*{box-sizing:border-box}html,body{margin:0}
body{background:#151515;color:#fbf7f3;font-family:'Satoshi','Helvetica Neue',Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased}
input::placeholder{color:#9c948b}
.hero{min-height:100vh;display:flex;flex-direction:column;position:relative}
.bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center 28%;display:block;z-index:0}
.scrim{position:absolute;inset:0;z-index:1;background:linear-gradient(180deg,rgba(15,15,15,.55) 0%,rgba(15,15,15,.05) 24%,rgba(15,15,15,.1) 46%,rgba(15,15,15,.86) 100%)}
.head{position:relative;z-index:2;display:flex;justify-content:space-between;align-items:center;padding:clamp(18px,3.5vw,26px) clamp(20px,5vw,52px)}
.logo-pill{background:#fbf7f3;border-radius:100px;padding:9px 16px;display:inline-flex}
.logo{height:clamp(30px,3.4vw,38px);width:auto;display:block}
.status{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:500;color:#fbf7f3}
.dot{width:8px;height:8px;border-radius:50%;background:#e71615;display:inline-block}
.copy{position:relative;z-index:2;flex:1;display:flex;flex-direction:column;justify-content:flex-end;padding:0 clamp(22px,5vw,56px) clamp(34px,5vw,56px)}
.eyebrow{font-weight:700;font-size:clamp(13px,1.4vw,15px);letter-spacing:.04em;color:#fdcfd9;margin-bottom:16px}
h1{font-family:'Clash Display','Helvetica Neue',Helvetica,Arial,sans-serif;font-weight:700;font-size:clamp(48px,9vw,96px);line-height:.95;margin:0;max-width:640px;letter-spacing:-.015em}
.band{position:relative;z-index:2;background:#fdcfd9;color:#151515;padding:clamp(24px,3.5vw,34px) clamp(22px,5vw,56px);display:flex;flex-wrap:wrap;gap:22px;align-items:center;justify-content:space-between}
.band h2{font-family:'Clash Display','Helvetica Neue',Helvetica,Arial,sans-serif;font-weight:600;font-size:clamp(18px,2.2vw,22px);margin:0;line-height:1.1}
.band p{font-size:14px;color:#7a4753;margin:5px 0 0}
.band .txt{flex:0 1 auto;max-width:340px}
form{display:flex;flex-wrap:wrap;gap:10px;flex:1 1 320px;max-width:440px}
input[type=email]{flex:1 1 200px;min-width:0;font-family:'Satoshi','Helvetica Neue',Helvetica,Arial,sans-serif;font-size:15px;padding:15px 17px;border:none;border-radius:14px;background:#fff;color:#151515;outline:none}
button{flex:0 0 auto;font-family:'Satoshi','Helvetica Neue',Helvetica,Arial,sans-serif;font-weight:700;font-size:15px;color:#fff;background:#e71615;border:none;padding:15px 24px;border-radius:14px;cursor:pointer;white-space:nowrap}
button:hover{background:#c2110f}
.ok{display:none;flex:1 1 320px;max-width:440px;font-weight:500;font-size:15px;color:#151515;background:#fff;padding:15px 20px;border-radius:14px}
</style>
